# Single-container layout (Streamlit only). Use if you must map 8501 directly.
# If the UI still shows an infinite loading skeleton behind a reverse proxy, prefer docker-compose.yml (nginx).
services:
  social-media-productivity-eda:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: social-media-productivity-eda
    ports:
      - "8434:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped
