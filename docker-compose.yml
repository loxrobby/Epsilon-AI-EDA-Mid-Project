# Recommended behind Traefik / reverse proxies: expose **nginx** (port 80), not Streamlit directly.
# Streamlit’s WebSocket can fail when the outer proxy talks straight to :8501 without Upgrade headers.
services:
  social-media-productivity-eda:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: social-media-productivity-eda
    expose:
      - "8501"
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped
    networks:
      - eda-net

  nginx:
    image: nginx:alpine
    container_name: social-media-productivity-eda-nginx
    depends_on:
      - social-media-productivity-eda
    ports:
      # Host:container — adjust published port as needed; use 80:80 if you publish HTTP on 80
      - "8434:80"
    volumes:
      - ./nginx/streamlit.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - eda-net

networks:
  eda-net:
    driver: bridge
